name: 功能建议
description: 提出新的治理场景、命令、适配器或图谱关系
title: "建议："
labels: ["enhancement"]
body:
  - type: textarea
    id: scenario
    attributes:
      label: 使用场景
      description: 你希望 skm 解决什么具体问题？
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 你希望命令、输出或交互大概是什么样？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 其他信息
      description: 可补充已有 workaround、示例输出或相关工具链接。
